#
# HACS prerequisites (install via HACS → Frontend before using this file):
#   • lovelace-plotly-graph-card https://github.com/dbuezas/lovelace-plotly-graph-card
#   • lovelace-mushroom          https://github.com/piitaya/lovelace-mushroom
#   • card-mod                   https://github.com/thomasloven/lovelace-card-mod
#

views:
  - type: sections
    sections:
      - cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                entity: sensor.ourbrewbot_firmware_version
                content: '{{ states(''sensor.ourbrewbot_firmware_version'') }}'
                icon: mdi:tag
                icon_color: grey
              - type: template
                entity: sensor.ourbrewbot_ip_address
                content: '{{ states(''sensor.ourbrewbot_ip_address'') }}'
                icon: mdi:ip-network
                icon_color: grey
              - type: template
                entity: sensor.ourbrewbot_uptime
                content: >
                  {% set m = states('sensor.ourbrewbot_uptime') | int(0) %}
                  {% set d = (m // 1440) %} {% set h = ((m % 1440) // 60) %}
                  {% set mn = m % 60 %}
                  {% if d > 0 %}{{ d }}d {{ h }}h {{ mn }}m
                  {%elif h > 0 %}{{ h }}h {{ mn }}m
                  {% else %}{{ mn }}m
                  {% endif %}
                icon: mdi:clock-outline
                icon_color: grey
              - type: template
                entity: sensor.ourbrewbot_rssi
                content: '{{ states(''sensor.ourbrewbot_rssi'') }} dBm'
                icon: mdi:wifi
                icon_color: >
                  {% set r = states('sensor.ourbrewbot_rssi') | int(-100) %}
                  {% if r > -60 %} green 
                  {% elif r > -75 %} orange 
                  {% else %} red 
                  {% endif %}
              - type: template
                entity: sensor.ourbrewbot_free_heap
                content: >
                  {{ (states('sensor.ourbrewbot_free_heap') | int(0) / 1024) | round(1) }} KB
                icon: mdi:memory
                icon_color: grey
            grid_options:
              columns: full
            alignment: center
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                entity: sensor.ourbrewbot_f0_status
                content: >
                  {{ states('sensor.ourbrewbot_f0_name') | default('Fermenter 0', true) }}: {{ states('sensor.ourbrewbot_f0_status') | title }}
                icon: mdi:thermometer
                icon_color: >
                  {% set s = states('sensor.ourbrewbot_f0_status') %} 
                  {% if s == 'heating' %} orange 
                  {% elif s == 'cooling' %} blue 
                  {% elif s == 'alarm' %} red 
                  {% else %} green 
                  {% endif %}
              - type: template
                entity: sensor.ourbrewbot_f1_status
                content: >
                  {{ states('sensor.ourbrewbot_f1_name') | default('Fermenter 1', true) }}: {{ states('sensor.ourbrewbot_f1_status') | title }}
                icon: mdi:thermometer
                icon_color: >
                  {% set s = states('sensor.ourbrewbot_f1_status') %}
                  {% if s == 'heating' %} orange 
                  {% elif s == 'cooling' %} blue 
                  {% elif s == 'alarm' %} red 
                  {% else %} green 
                  {% endif %}
              - type: template
                entity: sensor.ourbrewbot_f2_status
                content: >
                  {{ states('sensor.ourbrewbot_f2_name') | default('Fermenter 2', true) }}: {{ states('sensor.ourbrewbot_f2_status') | title }}
                icon: mdi:thermometer
                icon_color: >
                  {% set s = states('sensor.ourbrewbot_f2_status') %}
                  {% if s == 'heating' %} orange 
                  {% elif s == 'cooling' %} blue 
                  {% elif s == 'alarm' %} red 
                  {% else %} green 
                  {% endif %}
              - type: template
                entity: sensor.ourbrewbot_f3_status
                content: >
                  {{ states('sensor.ourbrewbot_f3_name') | default('Fermenter 3', true) }}: {{ states('sensor.ourbrewbot_f3_status') | title }}
                icon: mdi:thermometer
                icon_color: >
                  {% set s = states('sensor.ourbrewbot_f3_status') %}
                  {% if s == 'heating' %} orange 
                  {% elif s == 'cooling' %} blue 
                  {% elif s == 'alarm' %} red 
                  {% else %} green 
                  {% endif %}
            grid_options:
              columns: full
            alignment: center
        column_span: 4
      - type: grid
        cards:
          - type: markdown
            content: >
              # <center>{{ states('sensor.ourbrewbot_f0_name') | default('Fermenter 0', true) }}</center>

              {% set beer = states('sensor.ourbrewbot_f0_beer_name') %}
              {% set yeast = states('sensor.ourbrewbot_f0_yeast') %}

              {% if beer not in ['unavailable', 'unknown', ''] and yeast not in
              ['unavailable', 'unknown', ''] %}
                ### <center>{{ beer }} · {{ yeast }}</center>
              {% elif beer not in ['unavailable', 'unknown', ''] %}
                ### <center>{{ beer }}</center>
              {% else %}
                ### <center>No beer loaded</center>
              {% endif %}
            text_only: true
            grid_options:
              columns: full
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                entity: sensor.ourbrewbot_f0_status
                content: '{{ states(''sensor.ourbrewbot_f0_status'') | title }}'
                icon: >
                  {% set s = states('sensor.ourbrewbot_f0_status') %}
                  {% if s == 'heating' %} mdi:fire
                  {% elif s == 'cooling' %} mdi:snowflake
                  {% elif s == 'alarm' %} mdi:alert 
                  {% else %} mdi:check-circle
                  {% endif %}
                icon_color: >
                  {% set s = states('sensor.ourbrewbot_f0_status') %} 
                  {% if s =='heating' %} orange 
                  {% elif s == 'cooling' %} blue 
                  {% elif s == 'alarm' %} red 
                  {% else %} green 
                  {% endif %}
                card_mod:
                  style: >
                    {% if states('sensor.ourbrewbot_f0_status') == 'alarm' %}
                    ha-card {
                      animation: brewbot-blink 1s step-start infinite;
                    } @keyframes brewbot-blink { 50% { opacity: 0; } } 
                    {% endif %}
              - type: template
                entity: sensor.ourbrewbot_f0_power
                content: Power
                icon: mdi:power
                icon_color: >
                  {{ 'green' if states('sensor.ourbrewbot_f0_power') == 'ON' else 'grey' }}
              - type: template
                entity: sensor.ourbrewbot_f0_temp_control
                content: Temp Ctrl
                icon: mdi:thermostat
                icon_color: >
                  {{ 'blue' if states('sensor.ourbrewbot_f0_temp_control') == 'ON' else 'grey' }}
              - type: template
                entity: sensor.ourbrewbot_f0_profile_running
                content: Profile
                icon: mdi:chart-timeline-variant
                icon_color: >
                  {{ 'purple' if states('sensor.ourbrewbot_f0_profile_running') == 'ON' else 'grey' }}
            grid_options:
              columns: full      
          - type: custom:plotly-graph
            grid_options:
              columns: full
            color_scheme: dutch_field
            title: >
              $fn ({ hass }) => hass.states['sensor.ourbrewbot_f0_name']?.state || 'Fermenter 0'
            entities:
              - entity: sensor.ourbrewbot_f0_beer_temperature
                name: Beer Temp
                line:
                  width: 1
                  shape: spline
              - entity: sensor.ourbrewbot_f0_ambient_temperature
                name: Fridge Temp
                line:
                  width: 1
                  shape: spline
              - entity: sensor.ourbrewbot_f0_ceiling_temperature
                name: Ceiling
              - entity: sensor.ourbrewbot_f0_floor_temperature
                name: Floor
              - entity: sensor.ourbrewbot_f0_gravity
                name: SG
                line:
                  width: 1
                  shape: spline
              - entity: sensor.ourbrewbot_f0_tg
                name: TG
              - entity: sensor.ourbrewbot_f0_og
                name: OG
            hours_to_show: 24
            refresh_interval: 10
            layout:
              yaxis:
                title: Temperature
              yaxis2:
                title: Gravity
              xaxis:
                rangeselector:
                  'y': 1.2
                  buttons:
                    - count: 5
                      step: minute
                    - count: 1
                      step: hour
                    - count: 12
                      step: hour
                    - count: 1
                      step: day
                    - count: 7
                      step: day
                    - count: 14
                      step: day
              legend:
                x: 0
                y: -0.8
            autorange_after_scroll: true
          - type: custom:mushroom-template-card
            primary: Status
            secondary: '{{ states(''sensor.ourbrewbot_f0_status'') | title }}'
            icon: >
              {% set s = states('sensor.ourbrewbot_f0_status') %} 
              {% if s == 'heating' %} mdi:fire 
              {% elif s == 'cooling' %} mdi:snowflake 
              {% elif s == 'alarm' %} mdi:alert-circle 
              {% else %} mdi:check-circle-outline 
              {% endif %}
            icon_color: >
              {% set s = states('sensor.ourbrewbot_f0_status') %} 
              {% if s == 'heating' %} orange 
              {% elif s == 'cooling' %} blue 
              {% elif s == 'alarm' %} red 
              {% else %} green 
              {% endif %}
          - type: custom:mushroom-template-card
            primary: Power
            secondary: '{{ states(''sensor.ourbrewbot_f0_power'') }}'
            icon: mdi:power
            icon_color: >
              {{ 'green' if states('sensor.ourbrewbot_f0_power') == 'ON' else 'grey' }}
          - type: custom:mushroom-template-card
            primary: Beer Temp
            secondary: >
              {% set t = states('sensor.ourbrewbot_f0_beer_temperature') %} 
              {% set u = states('sensor.ourbrewbot_f0_temperature_unit') | default('C') %} {{ t }} °{{ u }}
            icon: mdi:thermometer
            icon_color: >
              {% set s = states('sensor.ourbrewbot_f0_status') %}
              {% if s == 'heating' %} orange 
              {% elif s == 'cooling' %} blue 
              {% elif s == 'alarm' %} red 
              {% else %} green 
              {% endif %}
          - type: custom:mushroom-template-card
            primary: Temp Control
            secondary: '{{ states(''sensor.ourbrewbot_f0_temp_control'') }}'
            icon: mdi:thermostat
            icon_color: >
              {{ 'blue' if states('sensor.ourbrewbot_f0_temp_control') == 'ON' else 'grey' }}
          - type: custom:mushroom-template-card
            primary: Ambient Temp
            secondary: >
              {% set t = states('sensor.ourbrewbot_f0_ambient_temperature') %}
              {% set u = states('sensor.ourbrewbot_f0_temperature_unit') | default('C') %} {{ t }} °{{ u }}
            icon: mdi:home-thermometer-outline
            icon_color: purple
          - type: custom:mushroom-template-card
            primary: Profile
            secondary: '{{ states(''sensor.ourbrewbot_f0_profile_running'') }}'
            icon: mdi:chart-timeline-variant
            icon_color: >
              {{ 'purple' if states('sensor.ourbrewbot_f0_profile_running') == 'ON' else 'grey' }}
          - type: custom:mushroom-template-card
            primary: Temp Range
            secondary: '{{ states(''sensor.ourbrewbot_f0_temp_range'') }}'
            icon: mdi:thermometer-lines
            icon_color: green
          - type: custom:mushroom-template-card
            primary: Comp Delay
            secondary: '{{ states(''sensor.ourbrewbot_f0_compressor_delay'') }} min'
            icon: mdi:timer-outline
            icon_color: grey
          - type: custom:mushroom-template-card
            primary: Hysteresis
            secondary: '{{ states(''sensor.ourbrewbot_f0_hysteresis'') }} °'
            icon: mdi:swap-vertical
            icon_color: grey
          - type: custom:mushroom-template-card
            primary: OG
            secondary: '{{ states(''sensor.ourbrewbot_f0_og'') }}'
            icon: mdi:cup-water
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: Current SG
            secondary: '{{ states(''sensor.ourbrewbot_f0_gravity'') }}'
            icon: mdi:water
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: Target SG
            secondary: '{{ states(''sensor.ourbrewbot_f0_tg'') }}'
            icon: mdi:target
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: Attenuation
            secondary: '{{ states(''sensor.ourbrewbot_f0_attenuation'') }} %'
            icon: mdi:trending-down
            icon_color: teal
          - type: custom:mushroom-template-card
            primary: Est. ABV
            secondary: '{{ states(''sensor.ourbrewbot_f0_est_abv'') }} %'
            icon: mdi:beer
            icon_color: amber
          - type: custom:mushroom-template-card
            primary: Progress
            secondary: '{{ states(''sensor.ourbrewbot_f0_fermentation_progress'') }} %'
            icon: mdi:progress-clock
            icon_color: >
              {% set p = states('sensor.ourbrewbot_f0_fermentation_progress') | float(-1) %}
              {% if p < 0 %} grey 
              {% elif p < 50 %} orange 
              {% elif p < 90 %} yellow 
              {% else %} green 
              {% endif %}
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.ourbrewbot_f0_online
                state: 'off'
            card:
              type: custom:mushroom-template-card
              primary: Device Offline
              secondary: >
                {{ states('sensor.ourbrewbot_f0_name') | default('Fermenter 0', true) }} 
                has not published in the last 3 minutes. Check power and Wi-Fi.
              icon: mdi:wifi-off
              icon_color: red
              card_mod:
                style: |
                  ha-card {
                    border: 2px solid var(--error-color);
                    animation: brewbot-blink 1s step-start infinite;
                  }
                  @keyframes brewbot-blink { 50% { opacity: 0.4; } }
        column_span: 4
