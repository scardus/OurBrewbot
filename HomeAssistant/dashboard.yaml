            tap_action:
              action: toggle
            icon_tap_action:
              action: toggle              
          - type: custom:mushroom-template-card
            entity: select.ourbrewbot_f1_profile_no
            primary: Profile No
            secondary: '{{ states(''select.ourbrewbot_f1_profile_no'') }}'
