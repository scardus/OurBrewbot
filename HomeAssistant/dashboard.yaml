                    - count: 1
                      step: hour
                    - count: 12
                      step: hour
                    - count: 1
                      step: day
                    - count: 7
                      step: day
                    - count: 14
                      step: day
              legend:
                x: 0
                y: -0.5
            autorange_after_scroll: true
          - type: custom:mushroom-template-card
            primary: Status
            secondary: '{{ states(''sensor.ourbrewbot_f1_status'') | title }}'
            icon: >
              {% set s = states('sensor.ourbrewbot_f1_status') %}
              {% if s == 'heating' %} mdi:fire
              {% elif s == 'cooling' %} mdi:snowflake
              {% elif s == 'alarm' %} mdi:alert-circle
